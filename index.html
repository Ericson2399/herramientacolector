<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitud Colector + Supervisoras</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #f4f6f8;
    padding: 30px;
}

/* ===== LAYOUT PRINCIPAL ===== */
.contenedor {
    display: flex;
    gap: 30px;
    align-items: flex-start;
}

/* ===== COLECTOR ===== */
.card {
    background: #ffffff;
    width: 100%;
    max-width: 450px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.card h2 {
    text-align: center;
}

label {
    font-weight: 600;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.money {
    display: flex;
    align-items: center;
}
.money span {
    margin-right: 5px;
    font-weight: bold;
}

textarea {
    height: 150px;
    resize: none;
}

.buttons {
    display: flex;
    gap: 10px;
}
.buttons button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.copy {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
}
.clear {
    background: #e0e0e0;
}

/* ===== SUPERVISORAS ===== */
#supervisoras {
    flex: 1;
    max-width: 500px;
}

#supervisoras h1 {
    text-align: center;
    margin-bottom: 15px;
}

#supervisoras input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.resultado {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.lugar {
    font-weight: bold;
    font-size: 17px;
}
.supervisora {
    color: #555;
}
</style>
</head>

<body>

<div class="contenedor">

<!-- ===== SOLICITUD COLECTOR (IZQUIERDA) ===== -->
<div class="card">
<h2>Solicitud Colector</h2>

<label>Solicitud Realizada</label>
<input id="solicitante" oninput="generarTexto()">

<label>Código</label>
<input id="codigo" oninput="generarTexto()">

<label>Monto</label>
<div class="money">
<span>RD$</span>
<input type="number" id="monto" oninput="generarTexto()">
</div>

<label>Disponibilidad</label>
<input id="disponibilidad" oninput="generarTexto()">

<label>Dirección</label>
<input id="direccion" oninput="generarTexto()">

<label>Fecha Visita</label>
<input type="date" id="fecha" oninput="generarTexto()">

<label>Teléfono</label>
<input id="telefono" oninput="generarTexto()">

<textarea id="resultado" readonly></textarea>

<div class="buttons">
<button class="copy" onclick="copiarTexto()">Copiar</button>
<button class="clear" onclick="limpiar()">Limpiar</button>
</div>
</div>

<!-- ===== BUSCADOR SUPERVISORAS (ARRIBA DERECHA) ===== -->
<div id="supervisoras">
<h1>🔍 Supervisoras</h1>
<input type="text" id="busqueda" placeholder="Escribe el nombre del lugar...">
<div id="resultados"></div>
</div>

</div>

/* ===== COLECTOR ===== */
function generarTexto() {
    const f = fecha.value ? fecha.value.split("-") : [];
    const fechaTexto = f.length ? `${f[2]}-${f[1]}-${f[0]}` : "";

    resultado.value =
`Solicitud Realizada:${solicitante.value}
Código:${codigo.value}
Monto:${monto.value ? 'RD$'+monto.value : ''}
Disponibilidad:${disponibilidad.value}
Dirección:${direccion.value}
Fecha Visita:${fechaTexto}
Teléfono:${telefono.value}`;
}

function copiarTexto() {
    resultado.select();
    document.execCommand("copy");
    alert("Texto copiado ✔");
}

    document.querySelectorAll(".card input, .card textarea").forEach(e => e.value = "");
}
